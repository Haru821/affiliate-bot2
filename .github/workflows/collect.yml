name: Daily Reddit Collector

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run collector
        run: python collector.py

      - name: Save results
        uses: actions/upload-artifact@v3
        with:
          name: reddit-data
          path: raw_data_*.json
