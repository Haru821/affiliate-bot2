name: Daily Affiliate Bot

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
      HATENA_ID:             ${{ secrets.HATENA_ID }}
      HATENA_API_KEY:        ${{ secrets.HATENA_API_KEY }}
      HATENA_BLOG_ID:        ${{ secrets.HATENA_BLOG_ID }}
      UNSPLASH_ACCESS_KEY:   ${{ secrets.UNSPLASH_ACCESS_KEY }}
      X_CONSUMER_KEY:        ${{ secrets.X_CONSUMER_KEY }}
      X_CONSUMER_SECRET:     ${{ secrets.X_CONSUMER_SECRET }}
      X_ACCESS_TOKEN:        ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
      QIITA_ACCESS_TOKEN:    ${{ secrets.QIITA_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests google-genai requests-oauthlib

      - name: Run collector
        run: python collector.py

      - name: Run generator
        run: python generator.py

      - name: Run publisher
        run: python publisher.py

      - name: Run social
        run: python social.py

      - name: Run qiita
        run: python qiita_publisher.py

      - name: Save results
        uses: actions/upload-artifact@v4
        with:
          name: reddit-data
          path: |
            raw_data_*.json
            articles/
